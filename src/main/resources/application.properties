spring.application.name=private-chatbot

# ==================== Database ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatbot_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== PgVector ====================
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=${PGVECTOR_DIMENSIONS:1024}
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# ==================== OpenAI Compatible API ====================
spring.ai.openai.base-url=${AI_BASE_URL:http://localhost:8001}
spring.ai.openai.api-key=${AI_API_KEY:changeme}

# Chat model (Spring AI 2.0 â€” options.* prefix removed)
spring.ai.openai.chat.model=${AI_CHAT_MODEL:Llama-4-Maverick-17B-128E-Instruct-FP8}
spring.ai.openai.chat.max-completion-tokens=${AI_MAX_TOKENS:3000}
spring.ai.openai.chat.temperature=${AI_TEMPERATURE:0.7}

# Embedding model
spring.ai.openai.embedding.model=${AI_EMBEDDING_MODEL:text-embedding-ada-002}

# Embedding provider: OPENAI_COMPATIBLE (default) or OLLAMA
app.embedding.provider=${AI_EMBEDDING_PROVIDER:OPENAI_COMPATIBLE}

# Embedding endpoint â€” ArvanCloud (and similar) use a different URL and key from the chat API
app.embedding.base-url=${AI_EMBEDDING_BASE_URL:}
app.embedding.api-key=${AI_EMBEDDING_API_KEY:}

# ==================== Thymeleaf ====================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ==================== Server ====================
server.port=${SERVER_PORT:8081}
server.servlet.session.timeout=30m

# ==================== Ollama Defaults ====================
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${OLLAMA_MODEL:llama3}

# ==================== Auto-configuration ====================
# Ollama chat/embedding auto-config is disabled â€” clients are created programmatically per-chatbot
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

# ==================== App Settings ====================
app.chat.history-limit=${CHAT_HISTORY_LIMIT:20}
app.rag.top-k=${RAG_TOP_K:5}
app.rag.query-history-turns=${RAG_QUERY_HISTORY_TURNS:3}
app.log.chat-details=${LOG_CHAT_DETAILS:false}

# ==================== Logging ====================
# Directory for the active log file and daily archives.
# Override with LOG_PATH env var or -Dapp.log.path=... JVM arg.
app.log.path=${LOG_PATH:ProdLogs}
