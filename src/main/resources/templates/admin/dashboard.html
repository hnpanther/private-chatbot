<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЩҫЩҶЩ„ Щ…ШҜЫҢШұЫҢШӘ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4">
    <div class="row">
        <!-- Admin sidebar -->
        <div class="col-lg-2 col-md-3">
            <div class="list-group list-group-flush rounded shadow-sm">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-speedometer2 me-2"></i> ШҜШ§ШҙШЁЩҲШұШҜ
                </a>
                <a th:href="@{/admin/users}" class="list-group-item list-group-item-action">
                    <i class="bi bi-people me-2"></i> Ъ©Ш§ШұШЁШұШ§ЩҶ
                </a>
                <a th:href="@{/admin/departments}" class="list-group-item list-group-item-action">
                    <i class="bi bi-building me-2"></i> ЩҲШ§ШӯШҜЩҮШ§
                </a>
                <a th:href="@{/admin/chatbots}" class="list-group-item list-group-item-action">
                    <i class="bi bi-robot me-2"></i> ЪҶШӘвҖҢШЁШ§ШӘвҖҢЩҮШ§
                </a>
            </div>
        </div>

        <div class="col-lg-10 col-md-9">
            <h4 class="fw-bold mb-4"><i class="bi bi-speedometer2 me-2"></i> ШҜШ§ШҙШЁЩҲШұШҜ Щ…ШҜЫҢШұЫҢШӘ</h4>

            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-primary-subtle text-primary rounded-3 p-3">
                                <i class="bi bi-people fs-3"></i>
                            </div>
                            <div>
                                <div class="fs-2 fw-bold" th:text="${stats['users']}">0</div>
                                <div class="text-muted small">Ъ©Ш§ШұШЁШұШ§ЩҶ</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-success-subtle text-success rounded-3 p-3">
                                <i class="bi bi-building fs-3"></i>
                            </div>
                            <div>
                                <div class="fs-2 fw-bold" th:text="${stats['departments']}">0</div>
                                <div class="text-muted small">ЩҲШ§ШӯШҜЩҮШ§</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-info-subtle text-info rounded-3 p-3">
                                <i class="bi bi-robot fs-3"></i>
                            </div>
                            <div>
                                <div class="fs-2 fw-bold" th:text="${stats['chatbots']}">0</div>
                                <div class="text-muted small">ЪҶШӘвҖҢШЁШ§ШӘвҖҢЩҮШ§</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="stat-card card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon bg-warning-subtle text-warning rounded-3 p-3">
                                <i class="bi bi-chat-dots fs-3"></i>
                            </div>
                            <div>
                                <div class="fs-2 fw-bold" th:text="${stats['messages']}">0</div>
                                <div class="text-muted small">ЩҫЫҢШ§Щ…вҖҢЩҮШ§</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center p-4">
                            <i class="bi bi-person-plus fs-1 text-primary mb-2 d-block"></i>
                            <h6>Щ…ШҜЫҢШұЫҢШӘ Ъ©Ш§ШұШЁШұШ§ЩҶ</h6>
                            <a th:href="@{/admin/users}" class="btn btn-outline-primary btn-sm mt-2">Щ…ШҙШ§ЩҮШҜЩҮ</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center p-4">
                            <i class="bi bi-building-add fs-1 text-success mb-2 d-block"></i>
                            <h6>Щ…ШҜЫҢШұЫҢШӘ ЩҲШ§ШӯШҜЩҮШ§</h6>
                            <a th:href="@{/admin/departments}" class="btn btn-outline-success btn-sm mt-2">Щ…ШҙШ§ЩҮШҜЩҮ</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body text-center p-4">
                            <i class="bi bi-robot fs-1 text-info mb-2 d-block"></i>
                            <h6>Щ…ШҜЫҢШұЫҢШӘ ЪҶШӘвҖҢШЁШ§ШӘвҖҢЩҮШ§</h6>
                            <a th:href="@{/admin/chatbots}" class="btn btn-outline-info btn-sm mt-2">Щ…ШҙШ§ЩҮШҜЩҮ</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
