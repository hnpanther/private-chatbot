<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت واحدها</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-2 col-md-3">
            <div class="list-group list-group-flush rounded shadow-sm">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i> داشبورد
                </a>
                <a th:href="@{/admin/users}" class="list-group-item list-group-item-action">
                    <i class="bi bi-people me-2"></i> کاربران
                </a>
                <a th:href="@{/admin/departments}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-building me-2"></i> واحدها
                </a>
                <a th:href="@{/admin/chatbots}" class="list-group-item list-group-item-action">
                    <i class="bi bi-robot me-2"></i> چت‌بات‌ها
                </a>
            </div>
        </div>

        <div class="col-lg-10 col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-building me-2"></i> مدیریت واحدها</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#deptModal">
                    <i class="bi bi-plus-lg me-1"></i> واحد جدید
                </button>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>نام واحد</th>
                                <th>نام انگلیسی</th>
                                <th>توضیحات</th>
                                <th>وضعیت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d, stat : ${departments}">
                                <td th:text="${stat.index + 1}" class="text-muted small"></td>
                                <td class="fw-medium" th:text="${d.name}"></td>
                                <td class="text-muted" th:text="${d.nameEn ?: '-'}"></td>
                                <td class="text-muted small" th:text="${d.description ?: '-'}"></td>
                                <td>
                                    <span th:if="${d.active}" class="badge bg-success">فعال</span>
                                    <span th:unless="${d.active}" class="badge bg-danger">غیرفعال</span>
                                </td>
                                <td class="d-flex gap-1">
                                    <button class="btn btn-sm btn-outline-secondary"
                                            th:data-id="${d.id}"
                                            th:data-name="${d.name}"
                                            th:data-nameen="${d.nameEn}"
                                            th:data-desc="${d.description}"
                                            th:data-active="${d.active}"
                                            onclick="editDeptFromBtn(this)">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <form th:action="@{/admin/departments/{id}/delete(id=${d.id})}" method="post"
                                          onsubmit="return confirm('آیا مطمئن هستید؟')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${departments.isEmpty()}">
                                <td colspan="6" class="text-center text-muted py-4">واحدی یافت نشد</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Dept Modal -->
<div class="modal fade" id="deptModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deptModalTitle">واحد جدید</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/departments/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="id" id="deptId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">نام واحد *</label>
                        <input type="text" class="form-control" name="name" id="deptName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">نام انگلیسی</label>
                        <input type="text" class="form-control" name="nameEn" id="deptNameEn">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">توضیحات</label>
                        <textarea class="form-control" name="description" id="deptDesc" rows="2"></textarea>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="active" value="true" id="deptActive" checked>
                        <label class="form-check-label" for="deptActive">فعال</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="submit" class="btn btn-primary">ذخیره</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function editDeptFromBtn(btn) {
    const d = btn.dataset;
    document.getElementById('deptId').value = d.id;
    document.getElementById('deptName').value = d.name || '';
    document.getElementById('deptNameEn').value = (d.nameen && d.nameen !== 'null') ? d.nameen : '';
    document.getElementById('deptDesc').value = (d.desc && d.desc !== 'null') ? d.desc : '';
    document.getElementById('deptActive').checked = d.active === 'true';
    document.getElementById('deptModalTitle').textContent = 'ویرایش واحد';
    new bootstrap.Modal(document.getElementById('deptModal')).show();
}
</script>
</body>
</html>
