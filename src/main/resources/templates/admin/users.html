<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت کاربران</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-2 col-md-3">
            <div class="list-group list-group-flush rounded shadow-sm">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i> داشبورد
                </a>
                <a th:href="@{/admin/users}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-people me-2"></i> کاربران
                </a>
                <a th:href="@{/admin/departments}" class="list-group-item list-group-item-action">
                    <i class="bi bi-building me-2"></i> واحدها
                </a>
                <a th:href="@{/admin/chatbots}" class="list-group-item list-group-item-action">
                    <i class="bi bi-robot me-2"></i> چت‌بات‌ها
                </a>
            </div>
        </div>

        <div class="col-lg-10 col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-people me-2"></i> مدیریت کاربران</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createUserModal">
                    <i class="bi bi-person-plus me-1"></i> افزودن کاربر
                </button>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>نام کاربری</th>
                                <th>نام کامل</th>
                                <th>ایمیل</th>
                                <th>نقش‌ها</th>
                                <th>واحدها</th>
                                <th>وضعیت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u, stat : ${users}">
                                <td th:text="${stat.index + 1}" class="text-muted small"></td>
                                <td class="fw-medium" th:text="${u.username}"></td>
                                <td th:text="${u.fullName}"></td>
                                <td class="text-muted small" th:text="${u.email ?: '-'}"></td>
                                <td>
                                    <span th:each="r : ${u.roles}"
                                          class="badge bg-primary-subtle text-primary me-1"
                                          th:text="${r.description ?: r.name}"></span>
                                </td>
                                <td>
                                    <span th:each="d : ${u.departments}"
                                          class="badge bg-success-subtle text-success me-1"
                                          th:text="${d.name}"></span>
                                    <span th:if="${u.departments.isEmpty()}" class="text-muted small">—</span>
                                </td>
                                <td>
                                    <span th:if="${u.enabled}" class="badge bg-success">فعال</span>
                                    <span th:unless="${u.enabled}" class="badge bg-danger">غیرفعال</span>
                                </td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-warning"
                                                th:title="${u.enabled} ? 'غیرفعال کردن' : 'فعال کردن'">
                                            <i th:class="${u.enabled} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${users.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">کاربری یافت نشد</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Create User Modal -->
<div class="modal fade" id="createUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">افزودن کاربر جدید</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/users/create}" th:object="${newUser}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">نام کاربری *</label>
                        <input type="text" class="form-control" th:field="*{username}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رمز عبور *</label>
                        <input type="password" class="form-control" th:field="*{password}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">نام کامل *</label>
                        <input type="text" class="form-control" th:field="*{fullName}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ایمیل</label>
                        <input type="email" class="form-control" th:field="*{email}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">نقش‌ها</label>
                        <div th:each="role : ${roles}" class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="roleIds" th:value="${role.id}" th:id="'role-' + ${role.id}">
                            <label class="form-check-label" th:for="'role-' + ${role.id}"
                                   th:text="${role.description ?: role.name}"></label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">واحدها</label>
                        <div th:each="dept : ${departments}" class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   name="departmentIds" th:value="${dept.id}" th:id="'dept-' + ${dept.id}">
                            <label class="form-check-label" th:for="'dept-' + ${dept.id}"
                                   th:text="${dept.name}"></label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="submit" class="btn btn-primary">ذخیره</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
