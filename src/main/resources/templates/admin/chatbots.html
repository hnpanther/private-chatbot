<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت چت‌بات‌ها</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/dist/css/bootstrap.rtl.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-2 col-md-3">
            <div class="list-group list-group-flush rounded shadow-sm">
                <a th:href="@{/admin}" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i> داشبورد
                </a>
                <a th:href="@{/admin/users}" class="list-group-item list-group-item-action">
                    <i class="bi bi-people me-2"></i> کاربران
                </a>
                <a th:href="@{/admin/departments}" class="list-group-item list-group-item-action">
                    <i class="bi bi-building me-2"></i> واحدها
                </a>
                <a th:href="@{/admin/chatbots}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-robot me-2"></i> چت‌بات‌ها
                </a>
            </div>
        </div>

        <div class="col-lg-10 col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-robot me-2"></i> مدیریت چت‌بات‌ها</h4>
                <button class="btn btn-primary" onclick="openNewBotModal()">
                    <i class="bi bi-plus-lg me-1"></i> چت‌بات جدید
                </button>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>نام</th>
                                <th>واحد</th>
                                <th>مدل LLM</th>
                                <th>RAG Filter Key</th>
                                <th>وضعیت</th>
                                <th>عملیات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b, stat : ${chatbots}">
                                <td th:text="${stat.index + 1}" class="text-muted small"></td>
                                <td>
                                    <i th:class="${b.icon ?: 'bi bi-robot'}" class="me-1 text-primary"></i>
                                    <span class="fw-medium" th:text="${b.name}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-success-subtle text-success" th:text="${b.department.name}"></span>
                                </td>
                                <td>
                                    <span th:if="${b.llmProvider == null or b.llmProvider.name() == 'GLOBAL'}"
                                          class="badge bg-secondary">Global</span>
                                    <span th:if="${b.llmProvider != null and b.llmProvider.name() == 'OPENAI_COMPATIBLE'}"
                                          class="badge bg-primary" th:text="${'OpenAI: ' + (b.llmModel ?: '(default)')}"></span>
                                    <span th:if="${b.llmProvider != null and b.llmProvider.name() == 'OLLAMA'}"
                                          class="badge bg-warning text-dark" th:text="${'Ollama: ' + (b.llmModel ?: '(default)')}"></span>
                                </td>
                                <td class="text-muted small font-monospace" th:text="${b.ragFilterKey ?: b.id}"></td>
                                <td>
                                    <span th:if="${b.active}" class="badge bg-success">فعال</span>
                                    <span th:unless="${b.active}" class="badge bg-secondary">غیرفعال</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button type="button" class="btn btn-sm btn-outline-primary"
                                                title="ویرایش"
                                                th:data-id="${b.id}"
                                                th:data-name="${b.name}"
                                                th:data-description="${b.description}"
                                                th:data-systemprompt="${b.systemPrompt}"
                                                th:data-icon="${b.icon}"
                                                th:data-ragfilterkey="${b.ragFilterKey}"
                                                th:data-departmentid="${b.department.id}"
                                                th:data-llmprovider="${b.llmProvider != null ? b.llmProvider.name() : 'GLOBAL'}"
                                                th:data-llmbaseurl="${b.llmBaseUrl}"
                                                th:data-llmmodel="${b.llmModel}"
                                                th:data-active="${b.active}"
                                                onclick="editBot(this)">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form th:action="@{/admin/chatbots/{id}/toggle(id=${b.id})}" method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-sm btn-outline-warning" title="تغییر وضعیت">
                                                <i class="bi bi-toggle-on"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/chatbots/{id}/delete(id=${b.id})}" method="post"
                                              onsubmit="return confirm('آیا مطمئن هستید؟')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${chatbots.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-4">چت‌باتی یافت نشد</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bot Modal -->
<div class="modal fade" id="botModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="botModalTitle">چت‌بات جدید</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/chatbots/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="id" id="botId">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">نام چت‌بات *</label>
                            <input type="text" class="form-control" name="name" id="botName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">واحد *</label>
                            <select class="form-select" name="departmentId" id="botDeptId" required>
                                <option value="">انتخاب کنید...</option>
                                <option th:each="d : ${departments}"
                                        th:value="${d.id}"
                                        th:text="${d.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">آیکون (Bootstrap Icon class)</label>
                            <input type="text" class="form-control" name="icon" id="botIcon" placeholder="bi bi-robot">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">RAG Filter Key</label>
                            <input type="text" class="form-control" name="ragFilterKey" id="botRagKey"
                                   placeholder="مثال: hr_bot_v1 (در صورت خالی بودن، ID چت‌بات استفاده می‌شود)">
                        </div>
                        <div class="col-12">
                            <label class="form-label">توضیحات</label>
                            <input type="text" class="form-control" name="description" id="botDesc">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Prompt سیستمی</label>
                            <textarea class="form-control" name="systemPrompt" id="botSystemPrompt" rows="3"
                                      placeholder="دستورالعمل‌های چت‌بات را اینجا بنویسید..."></textarea>
                        </div>

                        <!-- LLM Provider -->
                        <div class="col-12"><hr class="my-1">
                            <label class="form-label fw-bold">تنظیمات مدل هوش مصنوعی</label>
                            <select class="form-select" name="llmProvider" id="llmProviderSelect"
                                    onchange="toggleLlmFields(this)">
                                <option value="GLOBAL">استفاده از تنظیمات کلی سیستم</option>
                                <option value="OPENAI_COMPATIBLE">OpenAI Compatible (آدرس اختصاصی)</option>
                                <option value="OLLAMA">Ollama</option>
                            </select>
                        </div>
                        <div id="llmCustomFields" class="col-12 d-none">
                            <div class="row g-2">
                                <div class="col-12">
                                    <label class="form-label">آدرس Base URL</label>
                                    <input type="text" class="form-control" name="llmBaseUrl" id="botLlmBaseUrl"
                                           placeholder="http://my-server/v1  یا  http://localhost:11434">
                                </div>
                                <div class="col-md-6" id="llmApiKeyGroup">
                                    <label class="form-label">API Key</label>
                                    <input type="password" class="form-control" name="llmApiKey" id="botLlmApiKey"
                                           placeholder="خالی = مقدار فعلی حفظ می‌شود">
                                    <div class="form-text">
                                        برای ArvanCloud: <code>apikey &lt;کلید&gt;</code> وارد کنید.
                                        برای سرویس‌های استاندارد: فقط کلید را وارد کنید.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">نام مدل</label>
                                    <input type="text" class="form-control" name="llmModel" id="botLlmModel"
                                           placeholder="llama3  یا  DeepSeek-R1-qwen-7b-awq">
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="active" value="true" id="botActive">
                                <label class="form-check-label" for="botActive">فعال</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
                    <button type="submit" class="btn btn-primary">ذخیره</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/dist/js/bootstrap.bundle.min.js}"></script>
<script>
function toggleLlmFields(select) {
    const customFields = document.getElementById('llmCustomFields');
    const apiKeyGroup  = document.getElementById('llmApiKeyGroup');
    const isGlobal = select.value === 'GLOBAL';
    const isOllama = select.value === 'OLLAMA';
    customFields.classList.toggle('d-none', isGlobal);
    apiKeyGroup.classList.toggle('d-none', isOllama);
}

function resetModal() {
    document.getElementById('botId').value = '';
    document.getElementById('botName').value = '';
    document.getElementById('botDesc').value = '';
    document.getElementById('botSystemPrompt').value = '';
    document.getElementById('botIcon').value = '';
    document.getElementById('botRagKey').value = '';
    document.getElementById('botDeptId').value = '';
    document.getElementById('llmProviderSelect').value = 'GLOBAL';
    document.getElementById('botLlmBaseUrl').value = '';
    document.getElementById('botLlmApiKey').value = '';
    document.getElementById('botLlmModel').value = '';
    document.getElementById('botActive').checked = true;
    toggleLlmFields(document.getElementById('llmProviderSelect'));
}

function openNewBotModal() {
    resetModal();
    document.getElementById('botModalTitle').textContent = 'چت‌بات جدید';
    new bootstrap.Modal(document.getElementById('botModal')).show();
}

function editBot(btn) {
    resetModal();
    document.getElementById('botId').value          = btn.dataset.id || '';
    document.getElementById('botName').value        = btn.dataset.name || '';
    document.getElementById('botDesc').value        = btn.dataset.description || '';
    document.getElementById('botSystemPrompt').value = btn.dataset.systemprompt || '';
    document.getElementById('botIcon').value        = btn.dataset.icon || '';
    document.getElementById('botRagKey').value      = btn.dataset.ragfilterkey || '';
    document.getElementById('botLlmBaseUrl').value  = btn.dataset.llmbaseurl || '';
    document.getElementById('botLlmModel').value    = btn.dataset.llmmodel || '';
    document.getElementById('botActive').checked    = btn.dataset.active === 'true';

    const deptSelect = document.getElementById('botDeptId');
    deptSelect.value = btn.dataset.departmentid || '';

    const llmSelect = document.getElementById('llmProviderSelect');
    llmSelect.value = btn.dataset.llmprovider || 'GLOBAL';
    toggleLlmFields(llmSelect);

    // API key intentionally left empty — backend retains existing value if blank
    document.getElementById('botLlmApiKey').placeholder = 'خالی بگذارید تا کلید فعلی حفظ شود';

    document.getElementById('botModalTitle').textContent = 'ویرایش چت‌بات';
    new bootstrap.Modal(document.getElementById('botModal')).show();
}
</script>
</body>
</html>
