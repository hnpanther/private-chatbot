# ─────────────────────────────────────────────────────────────────
# Test application properties — override main application.properties
# ─────────────────────────────────────────────────────────────────

# H2 in-memory datasource replaces PostgreSQL for all Spring-context tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Exclude autoconfiguration that requires external services unavailable in tests
spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration,\
  org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

# Dummy Spring AI credentials — beans are created but never actually call the endpoint
spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=http://localhost:9999
spring.ai.openai.chat.model=test-model
spring.ai.openai.embedding.model=test-model

# App-specific values
app.chat.history-limit=5
app.rag.top-k=3
